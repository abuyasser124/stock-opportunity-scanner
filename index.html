<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 أداة صيد الفرص</title>

<style>
body {
  font-family: Arial;
  background: #0f1115;
  color: white;
  padding: 20px;
  direction: rtl;
}

.container {
  max-width: 1100px;
  margin: auto;
}

h1 {
  text-align: center;
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #333;
  background: #111;
  color: white;
}

button {
  padding: 12px 18px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.scan-btn { background:#1f8cff; color:white; }
.analyze-btn { background:#00b894; color:white; }

.status {
  margin-top: 10px;
  color: #ffd166;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
  gap: 12px;
  margin-top: 20px;
}

.card {
  background: #171a21;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid #2b3240;
}

.buy { color:#00ff88; }
.watch { color:#ffd000; }
.avoid { color:#ff4d4d; }
.waitbreakout { color:#ffb347; }

.small {
  color: #b8c0cc;
  font-size: 14px;
  margin-top: 6px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔥 أداة صيد الفرص</h1>

  <input id="symbolsInput" placeholder="AAPL أو AAPL,TSLA,NVDA" />

  <div>
    <button class="scan-btn" onclick="runScan()">تشغيل السكان</button>
    <button class="analyze-btn" onclick="runAnalysis()">تحليل سهم</button>
    <button class="scan-btn" onclick="runRadar()">🔥 أفضل الفرص</button>
  </div>

  <div class="status" id="status"></div>
  <div id="results" class="grid"></div>
</div>

<script>
const WORKER_URL = "https://flat-firefly-1af6.www-ana-com.workers.dev";

const RADAR_SYMBOLS = [
  "AAPL","NVDA","AMD","TSLA","META","AMZN","GOOGL","MSFT",
  "AVGO","NFLX","PLTR","SMCI","ARM","SHOP","UBER","ABNB",
  "CRM","ADBE","INTC","QCOM","PANW","ZS","CRWD","DDOG"
];

function decisionColor(text) {
  if (!text) return "watch";
  if (text.includes("دخول الآن")) return "buy";
  if (text.includes("تجنب")) return "avoid";
  if (text.includes("انتظار اختراق")) return "waitbreakout";
  return "watch";
}

function normalize(text) {
  return text.split(",").map(s => s.trim().toUpperCase()).filter(Boolean);
}

function renderPlan(stock) {
  if (stock.entryPoint == null && stock.stopLoss == null && stock.firstTarget == null) {
    return `<p class="small">لا توجد خطة دخول مباشرة حاليًا</p>`;
  }

  return `
    <p>نقطة الدخول: ${stock.entryPoint ?? "-"}</p>
    <p>وقف الخسارة: ${stock.stopLoss ?? "-"}</p>
    <p>الهدف الأول: ${stock.firstTarget ?? "-"}</p>
  `;
}

function renderCard(stock) {
  return `
    <div class="card">
      <h3>${stock.symbol}</h3>
      <p class="${decisionColor(stock.decision)}"><strong>${stock.decision}</strong></p>
      <p>السعر: ${stock.price}</p>
      <p>نوع الفرصة: ${stock.opportunityType}</p>
      <p>إشارة الاختراق: ${stock.breakoutSignal ?? "-"}</p>
      <p>السبب: ${stock.reason}</p>
      <p>درجة الفرصة: ${stock.opportunityScore} | درجة الدخول: ${stock.entryScore}</p>
      <p>الثقة: ${stock.confidence}</p>
      <p>${stock.volumeSignal}</p>
      <p>${stock.momentumSignal}</p>
      <p>${stock.locationSignal}</p>
      ${renderPlan(stock)}
    </div>
  `;
}

async function runScan() {
  const input = document.getElementById("symbolsInput").value;
  const status = document.getElementById("status");
  const results = document.getElementById("results");

  const symbols = normalize(input);

  if (symbols.length === 0) {
    status.textContent = "اكتب سهمًا واحدًا على الأقل";
    return;
  }

  status.textContent = "جارٍ التحليل...";

  try {
    const res = await fetch(`${WORKER_URL}/?symbols=${symbols.join(",")}&type=scan`);
    const data = await res.json();

    results.innerHTML = data.map(renderCard).join("");
    status.textContent = "تم التحليل";
  } catch (e) {
    status.textContent = "فشل تشغيل السكان";
  }
}

async function runAnalysis() {
  const input = document.getElementById("symbolsInput").value;
  const status = document.getElementById("status");
  const results = document.getElementById("results");

  const symbol = normalize(input)[0];

  if (!symbol) {
    status.textContent = "اكتب سهمًا";
    return;
  }

  status.textContent = "جارٍ تحليل السهم...";

  try {
    const res = await fetch(`${WORKER_URL}/?symbol=${symbol}&type=analysis`);
    const data = await res.json();

    results.innerHTML = renderCard(data);
    status.textContent = "تم التحليل";
  } catch (e) {
    status.textContent = "فشل تحليل السهم";
  }
}

async function runRadar() {
  const status = document.getElementById("status");
  const results = document.getElementById("results");

  status.textContent = "🔥 جارٍ البحث عن أفضل الفرص...";

  try {
    const res = await fetch(`${WORKER_URL}/?symbols=${RADAR_SYMBOLS.join(",")}&type=scan`);
    const data = await res.json();

    const top = data.slice(0, 6);

    results.innerHTML = top.map(renderCard).join("");
    status.textContent = "🔥 أفضل الفرص جاهزة";
  } catch (e) {
    status.textContent = "فشل تشغيل الرادار";
  }
}
</script>

</body>
</html>
